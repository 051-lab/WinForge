name: Build WinForge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build executable
        run: pyinstaller --onefile --windowed main.py --name WinForge

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: WinForge-exe
          path: dist/WinForge.exe
