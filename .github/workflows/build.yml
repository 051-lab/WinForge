name: Build WinForge
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: pyinstaller --onefile --windowed main.py --name WinForge
